<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Hanken Grotesk', sans-serif;
        }

    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-gutter">
<main class="w-full max-w-[400px] flex flex-col gap-xl">
<!-- Brand Header -->
<header class="flex flex-col items-center gap-base text-center">
<div class="flex items-center gap-sm mb-sm">
<span class="material-symbols-outlined text-primary text-[32px]" data-icon="account_balance_wallet">account_balance_wallet</span>
<h1 class="font-headline-md text-headline-md font-bold text-primary">Fintjam</h1>
</div>
<p class="font-body-md text-on-surface-variant">Solusi manajemen keuangan personal yang presisi.</p>
</header>
<!-- Auth Container (Login View) -->
<section class="bg-surface-container-lowest border border-outline-variant p-xl flex flex-col gap-lg" id="login-section">
<div class="flex flex-col gap-xs">
<h2 class="font-headline-sm text-headline-sm text-on-surface">Masuk ke Akun</h2>
<p class="font-body-sm text-on-surface-variant">Kelola transaksi dan laporan Rp Anda dengan mudah.</p>
</div>
<form action="#" class="flex flex-col gap-md" method="POST">
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="login-username">Nama Pengguna</label>
<input class="w-full h-12 px-md border border-outline bg-surface focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-all font-body-md" id="login-username" name="username" placeholder="Masukkan username" type="text"/>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="login-password">Kata Sandi</label>
<input class="w-full h-12 px-md border border-outline bg-surface focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-all font-body-md" id="login-password" name="password" placeholder="••••••••" type="password"/>
</div>
<button class="h-12 w-full bg-primary text-on-primary font-label-md hover:bg-opacity-90 active:scale-[0.98] transition-all flex items-center justify-center mt-sm" type="submit">
                    Masuk Sekarang
                </button>
</form>
<div class="pt-md border-t border-outline-variant text-center">
<p class="font-body-sm text-on-surface-variant">
                    Belum punya akun? 
                    <button class="text-secondary font-label-md hover:underline transition-all" onclick="document.getElementById('login-section').classList.add('hidden'); document.getElementById('register-section').classList.remove('hidden');">
                        Daftar Baru
                    </button>
</p>
</div>
</section>
<!-- Auth Container (Register View - Hidden by default) -->
<section class="hidden bg-surface-container-lowest border border-outline-variant p-xl flex flex-col gap-lg" id="register-section">
<div class="flex flex-col gap-xs">
<h2 class="font-headline-sm text-headline-sm text-on-surface">Pendaftaran Baru</h2>
<p class="font-body-sm text-on-surface-variant">Mulai pantau arus kas Anda dengan Fintjam.</p>
</div>
<form action="#" class="flex flex-col gap-md" method="POST">
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="reg-name">Nama Lengkap</label>
<input class="w-full h-12 px-md border border-outline bg-surface focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-all font-body-md" id="reg-name" name="fullname" placeholder="Nama sesuai KTP" type="text"/>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="reg-username">Nama Pengguna</label>
<input class="w-full h-12 px-md border border-outline bg-surface focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-all font-body-md" id="reg-username" name="username" placeholder="Username unik" type="text"/>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="reg-password">Kata Sandi</label>
<input class="w-full h-12 px-md border border-outline bg-surface focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-all font-body-md" id="reg-password" name="password" placeholder="Minimal 8 karakter" type="password"/>
</div>
<button class="h-12 w-full bg-primary text-on-primary font-label-md hover:bg-opacity-90 active:scale-[0.98] transition-all flex items-center justify-center mt-sm" type="submit">
                    Buat Akun
                </button>
</form>
<div class="pt-md border-t border-outline-variant text-center">
<p class="font-body-sm text-on-surface-variant">
                    Sudah memiliki akun? 
                    <button class="text-secondary font-label-md hover:underline transition-all" onclick="document.getElementById('register-section').classList.add('hidden'); document.getElementById('login-section').classList.remove('hidden');">
                        Masuk Disini
                    </button>
</p>
</div>
</section>
<!-- Footer Info -->
<footer class="flex flex-col items-center gap-xs">
<p class="font-label-sm text-label-sm text-outline uppercase tracking-wider">Keamanan Terjamin</p>
<div class="flex gap-md items-center opacity-40">
<span class="material-symbols-outlined text-[18px]" data-icon="lock">lock</span>
<span class="material-symbols-outlined text-[18px]" data-icon="verified_user">verified_user</span>
<span class="material-symbols-outlined text-[18px]" data-icon="shield">shield</span>
</div>
</footer>
</main>
</body></html>
