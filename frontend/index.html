<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script>
  // Entry point - cek token lalu arahkan
  const token = localStorage.getItem("fintjam_token");
  if (token) {
    window.location.replace("dashboard.html");
  } else {
    window.location.replace("login.html");
  }
</script>
</head>
<body></body>
</html>
