<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<br>
<button onclick="download()">Download Icons</button>

<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');

  // Background hitam
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, s, s);

  // Huruf F putih
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${s * 0.55}px 'Arial Black', Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('F', s / 2, s / 2 + s * 0.03);

  // Garis bawah aksen biru
  ctx.fillStyle = '#0051d5';
  ctx.fillRect(s * 0.2, s * 0.78, s * 0.6, s * 0.06);
}

drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));

function download() {
  ['c192','c512'].forEach(id => {
    const canvas = document.getElementById(id);
    const a = document.createElement('a');
    a.download = `icon-${canvas.width}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  });
}
</script>
</body>
</html>
